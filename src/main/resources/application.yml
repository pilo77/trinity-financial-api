server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: trinity-financial-api
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:}}
